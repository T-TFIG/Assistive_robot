controller_manager:
  ros__parameters:
    update_rate: 50
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    wheel1_velocity_controller:
      type: pid_controller/VelocityPIDControl

    wheel2_velocity_controller:
      type: pid_controller/VelocityPIDControl

    wheel3_velocity_controller:
      type: pid_controller/VelocityPIDControl


wheel1_velocity_controller:
  ros__parameters:
    joint: mobile_base_Revolute-1
    pid:
      p: 10.0
      i: 0.1
      d: 0.01
      i_clamp_min: -5.0
      i_clamp_max: 5.0

wheel2_velocity_controller:
  ros__parameters:
    joint: mobile_base_Revolute-2
    pid:
      p: 10.0
      i: 0.1
      d: 0.01
      i_clamp_min: -5.0
      i_clamp_max: 5.0

wheel3_velocity_controller:
  ros__parameters:
    joint: mobile_base_Revolute-3
    pid:
      p: 10.0
      i: 0.1
      d: 0.01
      i_clamp_min: -5.0
      i_clamp_max: 5.0
