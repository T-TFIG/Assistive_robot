controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    omni_base_controller:
      type: omni_pid_controller/PidController

joint_state_broadcaster:
  ros__parameters:
    use_sim_time: true
    joints:
      - mobile_base_Revolute_1
      - mobile_base_Revolute_2
      - mobile_base_Revolute_3
    map_interface_to_joint_state: true

omni_base_controller:
  ros__parameters:
    use_sim_time: true
    header_frame: "odom"
    child_frame: "base_link"
    num_of_wheels: 3
    robot_radius: 0.13
    wheel_radius: 0.06
    dof_names:
      - mobile_base_Revolute_1
      - mobile_base_Revolute_2
      - mobile_base_Revolute_3
    command_interface: effort        
    state_interfaces:
      - velocity
    i_min: -5.0
    i_max: 5.0
    wheel_1:
      kp: 0.5
      ki: 0.1
      kd: 0.0
    wheel_2:
      kp: 0.5
      ki: 0.1
      kd: 0.0
    wheel_3:
      kp: 0.5
      ki: 0.1
      kd: 0.0
    init_odom_vel:
      X: 0.0
      Y: 0.2
      Yaw: 0.0